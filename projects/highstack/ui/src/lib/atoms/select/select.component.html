@if (label()) {
  <label
    [for]="id()"
    class="block mb-1.5 text-sm font-medium text-[var(--color-foreground)]"
  >
    {{ label() }}
    @if (required()) {
      <span class="text-[var(--color-destructive)]">*</span>
    }
  </label>
}

<div class="relative">
  <button
    type="button"
    [id]="id()"
    data-trigger
    [class]="triggerClasses()"
    [disabled]="isDisabled()"
    [attr.aria-haspopup]="'listbox'"
    [attr.aria-expanded]="open()"
    [attr.aria-invalid]="hasError() || null"
    [attr.aria-describedby]="describedById()"
    (click)="toggle()"
  >
    <span [class]="selectedLabel() ? 'text-[var(--color-foreground)]' : 'text-[var(--color-muted-foreground)]'" class="truncate">
      {{ selectedLabel() || placeholder() }}
    </span>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="shrink-0 text-[var(--color-muted-foreground)] transition-transform"
      [class.rotate-180]="open()"
    >
      <path d="m6 9 6 6 6-6" />
    </svg>
  </button>

  <div
    role="listbox"
    class="absolute z-50 left-0 right-0 mt-1.5 max-h-60 overflow-y-auto rounded-[var(--radius)] border border-[var(--color-border)] bg-[var(--color-background)] p-1 shadow-md"
    [class.hidden]="!open()"
  >
    <ng-content />
  </div>
</div>

@if (hasError()) {
  <p [id]="describedById()" class="mt-1.5 text-xs text-[var(--color-destructive)]">{{ errorMessage() }}</p>
} @else if (hint()) {
  <p [id]="describedById()" class="mt-1.5 text-xs text-[var(--color-muted-foreground)]">{{ hint() }}</p>
}
