@if (visible()) {
  <!-- Contenedor a pantalla completa: centra el panel y captura el clic en el fondo. -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    (click)="onBackdropClick()"
  >
    <!-- Backdrop oscuro con su propia transición de opacidad. -->
    <div
      class="absolute inset-0 bg-black/50 transition-opacity duration-200"
      [class.opacity-100]="shown()"
      [class.opacity-0]="!shown()"
    ></div>

    <!-- Panel del diálogo. `stopPropagation` evita que el clic interno cierre el modal. -->
    <div
      role="dialog"
      aria-modal="true"
      tabindex="-1"
      [attr.aria-label]="ariaLabel()"
      [class]="panelClasses()"
      (click)="$event.stopPropagation()"
    >
      @if (showClose()) {
        <button
          type="button"
          (click)="close()"
          aria-label="Cerrar"
          class="absolute right-4 top-4 z-10 flex items-center justify-center size-7 rounded-md text-[var(--color-muted-foreground)] hover:text-[var(--color-foreground)] hover:bg-[var(--color-accent)] transition-colors cursor-pointer"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
        </button>
      }

      <ng-content />
    </div>
  </div>
}
