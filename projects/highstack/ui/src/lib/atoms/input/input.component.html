@if (label()) {
  <ui-label [for]="id()" [required]="required()">{{ label() }}</ui-label>
}

<div [class]="wrapperClasses()">
  <span class="shrink-0 flex items-center text-[var(--color-muted-foreground)]">
    <ng-content select="[slot=prefix]" />
  </span>

  <input
    [id]="id()"
    [type]="resolvedType()"
    [name]="name()"
    [placeholder]="placeholder()"
    [readonly]="readonly()"
    [disabled]="isDisabled()"
    [required]="required()"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="onBlur()"
    [attr.aria-invalid]="hasError() || null"
    [attr.aria-describedby]="describedById()"
    class="w-full min-w-0 bg-transparent border-0 p-0 outline-none text-[var(--color-foreground)] placeholder:text-[var(--color-muted-foreground)] disabled:cursor-not-allowed"
  />

  <span class="shrink-0 flex items-center text-[var(--color-muted-foreground)]">
    <ng-content select="[slot=suffix]" />
  </span>

  @if (hasPasswordToggle()) {
    <button
      type="button"
      (click)="showPassword.set(!showPassword())"
      [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
      class="shrink-0 flex items-center text-[var(--color-muted-foreground)] hover:text-[var(--color-foreground)] transition-colors cursor-pointer"
    >
      @if (showPassword()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" /><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" /><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" /><line x1="2" x2="22" y1="2" y2="22" /></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></svg>
      }
    </button>
  }
</div>

@if (hasError()) {
  <p [id]="describedById()" class="mt-1.5 text-xs text-[var(--color-destructive)]">
    {{ errorMessage() }}
  </p>
} @else if (hint()) {
  <p [id]="describedById()" class="mt-1.5 text-xs text-[var(--color-muted-foreground)]">
    {{ hint() }}
  </p>
}
