<h3>
  <button
    type="button"
    (click)="toggle()"
    [disabled]="disabled()"
    [attr.aria-expanded]="open()"
    [attr.aria-controls]="contentId"
    class="flex w-full items-center justify-between gap-3 py-4 text-left text-sm font-medium text-[var(--color-foreground)] transition-colors hover:text-[var(--color-foreground)]/80 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-ring)] rounded-sm"
  >
    <span>{{ title() }}</span>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="shrink-0 text-[var(--color-muted-foreground)] transition-transform duration-200"
      [class.rotate-180]="open()"
    >
      <path d="m6 9 6 6 6-6" />
    </svg>
  </button>
</h3>

<div
  [id]="contentId"
  role="region"
  class="grid transition-all duration-200"
  [class.grid-rows-[1fr]]="open()"
  [class.grid-rows-[0fr]]="!open()"
  [class.opacity-100]="open()"
  [class.opacity-0]="!open()"
>
  <div class="overflow-hidden">
    <div class="pb-4 text-sm text-[var(--color-muted-foreground)]">
      <ng-content />
    </div>
  </div>
</div>
