<label
  [for]="id()"
  class="flex items-start gap-2.5"
  [class.cursor-pointer]="!isDisabled()"
  [class.cursor-not-allowed]="isDisabled()"
>
  <span class="relative inline-flex items-center">
    <input
      type="checkbox"
      role="switch"
      [id]="id()"
      [name]="name()"
      [checked]="checked()"
      [disabled]="isDisabled()"
      [required]="required()"
      (change)="toggle($event)"
      class="peer absolute inset-0 size-full opacity-0 m-0 cursor-pointer disabled:cursor-not-allowed"
    />
    <span [class]="trackClasses()">
      <span [class]="thumbClasses()"></span>
    </span>
  </span>

  @if (label() || description()) {
    <span class="flex flex-col gap-0.5 -mt-px">
      @if (label()) {
        <span class="text-sm font-medium text-[var(--color-foreground)] leading-tight">
          {{ label() }}
          @if (required()) {
            <span class="text-[var(--color-destructive)]">*</span>
          }
        </span>
      }
      @if (description()) {
        <span class="text-xs text-[var(--color-muted-foreground)]">{{ description() }}</span>
      }
    </span>
  }
</label>
