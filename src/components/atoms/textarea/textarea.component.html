@if (label()) {
  <ui-label [for]="id()" [required]="required()">{{ label() }}</ui-label>
}

<textarea
  [id]="id()"
  [name]="name()"
  [rows]="rows()"
  [placeholder]="placeholder()"
  [readonly]="readonly()"
  [disabled]="isDisabled()"
  [required]="required()"
  [value]="value()"
  (input)="onInput($event)"
  (blur)="onBlur()"
  [attr.aria-invalid]="hasError() || null"
  [attr.aria-describedby]="describedById()"
  [class]="fieldClasses()"
></textarea>

@if (hasError()) {
  <p [id]="describedById()" class="mt-1.5 text-xs text-[var(--color-destructive)]">{{ errorMessage() }}</p>
} @else if (hint()) {
  <p [id]="describedById()" class="mt-1.5 text-xs text-[var(--color-muted-foreground)]">{{ hint() }}</p>
}
