<div class="flex h-screen bg-[var(--color-background)]">

  <!-- Sidebar -->
  <aside class="w-52 shrink-0 border-r border-[var(--color-border)] px-4 py-6 overflow-y-auto">
    
    <!-- Getting Started -->
    <p class="mb-3 px-2 text-xs font-semibold uppercase tracking-widest text-[var(--color-muted-foreground)]">
      Getting Started
    </p>
    <nav class="flex flex-col gap-0.5 mb-6">
      <a
        routerLink="/installation"
        routerLinkActive="bg-[var(--color-accent)] text-[var(--color-accent-foreground)] font-medium"
        class="inline-flex items-center rounded-[var(--radius)] px-3 h-8 text-sm text-[var(--color-foreground)] hover:bg-[var(--color-accent)] hover:text-[var(--color-accent-foreground)] transition-all cursor-pointer"
      >
        Instalación
      </a>
      <a
        routerLink="/themes"
        routerLinkActive="bg-[var(--color-accent)] text-[var(--color-accent-foreground)] font-medium"
        class="inline-flex items-center rounded-[var(--radius)] px-3 h-8 text-sm text-[var(--color-foreground)] hover:bg-[var(--color-accent)] hover:text-[var(--color-accent-foreground)] transition-all cursor-pointer"
      >
        Temas
      </a>
    </nav>

    <!-- Atoms -->
    <p class="mb-3 px-2 text-xs font-semibold uppercase tracking-widest text-[var(--color-muted-foreground)]">
      Atoms
    </p>
    <nav class="flex flex-col gap-0.5">
      <a
        routerLink="/atoms/button"
        routerLinkActive="bg-[var(--color-accent)] text-[var(--color-accent-foreground)] font-medium"
        class="inline-flex items-center rounded-[var(--radius)] px-3 h-8 text-sm text-[var(--color-foreground)] hover:bg-[var(--color-accent)] hover:text-[var(--color-accent-foreground)] transition-all cursor-pointer"
      >
        Button
      </a>
      <a
        routerLink="/atoms/input"
        routerLinkActive="bg-[var(--color-accent)] text-[var(--color-accent-foreground)] font-medium"
        class="inline-flex items-center rounded-[var(--radius)] px-3 h-8 text-sm text-[var(--color-foreground)] hover:bg-[var(--color-accent)] hover:text-[var(--color-accent-foreground)] transition-all cursor-pointer"
      >
        Input
      </a>
    </nav>
  </aside>

  <!-- Content -->
  <main class="flex-1 overflow-y-auto">
    <router-outlet />
  </main>

  <!-- Right Sidebar: nav "En esta página" (scroll-spy de la página activa) -->
  @if (pageNav.sections().length) {
    <aside class="w-60 shrink-0 border-l border-[var(--color-border)] px-4 py-6 overflow-y-auto">
      <div class="sticky top-0">
        <p class="mb-3 px-2 text-[11px] font-semibold uppercase tracking-widest text-[var(--color-muted-foreground)]">
          En esta página
        </p>
        <nav class="flex flex-col gap-0.5">
          @for (s of pageNav.sections(); track s.id) {
            <button
              type="button"
              (click)="pageNav.scrollTo(s.id)"
              class="group flex items-center gap-2.5 h-7 px-2 text-left text-xs cursor-pointer"
            >
              <span
                class="size-1.5 rounded-full transition-all duration-200"
                [class.bg-[var(--color-primary)]]="pageNav.active() === s.id"
                [class.scale-150]="pageNav.active() === s.id"
                [class.bg-[var(--color-border)]]="pageNav.active() !== s.id"
                [class.group-hover:bg-[var(--color-muted-foreground)]]="pageNav.active() !== s.id"
              ></span>
              <span
                class="transition-colors"
                [class.text-[var(--color-foreground)]]="pageNav.active() === s.id"
                [class.font-medium]="pageNav.active() === s.id"
                [class.text-[var(--color-muted-foreground)]]="pageNav.active() !== s.id"
                [class.group-hover:text-[var(--color-foreground)]]="pageNav.active() !== s.id"
              >{{ s.label }}</span>
            </button>
          }
        </nav>
      </div>
    </aside>
  }

</div>
