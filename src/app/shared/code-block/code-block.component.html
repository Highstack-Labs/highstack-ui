<div class="rounded-[var(--radius)] overflow-hidden border border-zinc-800 bg-zinc-900 shadow-[0_1px_2px_rgb(0_0_0/0.2),0_12px_28px_-12px_rgb(0_0_0/0.45)]">
  <!-- Barra superior -->
  <div class="flex items-center justify-between gap-3 px-3.5 h-9 border-b border-zinc-800 bg-zinc-800/40">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1.5">
        <span class="size-2.5 rounded-full bg-[#ff5f57]"></span>
        <span class="size-2.5 rounded-full bg-[#febc2e]"></span>
        <span class="size-2.5 rounded-full bg-[#28c840]"></span>
      </div>
      <span class="text-[11px] font-mono text-zinc-500 tracking-wide">{{ filename() || lang() }}</span>
    </div>

    <button
      type="button"
      (click)="copy()"
      aria-label="Copiar código"
      class="inline-flex items-center justify-center size-7 rounded-md text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-all cursor-pointer"
    >
      @if (copied()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><polyline points="20 6 9 17 4 12" /></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>
      }
    </button>
  </div>

  <!-- Código -->
  <pre
    class="overflow-auto select-text p-4 font-mono text-xs leading-relaxed text-zinc-100 scrollbar-code"
    [style.max-height]="maxHeight() || null"
  ><code>{{ code() }}</code></pre>
</div>
