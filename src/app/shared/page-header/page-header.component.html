<header
  class="sticky top-0 z-20 overflow-hidden border-b border-[var(--color-border)] bg-[var(--color-background)]/75 backdrop-blur-xl"
>
  <!-- Glow ambiental: da profundidad/3D detrás del título -->
  <div
    aria-hidden="true"
    class="pointer-events-none absolute -top-28 left-8 h-56 w-[40rem] max-w-[90%] rounded-full opacity-[0.14] blur-3xl
           bg-[radial-gradient(circle_at_center,var(--color-primary),transparent_70%)]"
  ></div>

  <div
    class="relative mx-auto px-8 py-5"
    [class.max-w-5xl]="width() === '5xl'"
    [class.max-w-3xl]="width() === '3xl'"
  >
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h1 class="text-2xl font-semibold tracking-tight">
          highstack-ui
          <span class="text-[var(--color-muted-foreground)] font-normal">· {{ section() }}</span>
        </h1>
        @if (subtitle()) {
          <p class="mt-2 max-w-2xl text-sm leading-relaxed text-[var(--color-muted-foreground)]">
            {{ subtitle() }}
          </p>
        }
      </div>

      <div class="shrink-0">
        <ng-content select="[actions]" />
      </div>
    </div>
  </div>
</header>
